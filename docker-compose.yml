services:
  db:
    image: mysql:8.0
    container_name: qlinic-db
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: qlinic
    ports:
      - "3307:3306"
    volumes:
      - qlinic-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
      interval: 3s

  backend:
    build: ./backend
    container_name: qlinic-backend
    restart: always
    ports:
      - "5001:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ""
      DB_NAME: qlinic
      JWT_SECRET: change_this_secret_for_local_dev
      JWT_EXPIRES_IN: 1d
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: qlinic-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5001/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  qlinic-db-data:
